name: Build Apps

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        cd vault_analytics
        pip install pywebview fastapi uvicorn pyinstaller

    - name: Build Windows executable
      run: |
        cd vault_analytics
        pyinstaller --name=VaultAnalytics --onefile --windowed --add-data="index.html;." --add-data="vault;vault" --hidden-import=requests --hidden-import=urllib3 --hidden-import=charset_normalizer --hidden-import=idna --hidden-import=certifi --hidden-import=packaging --hidden-import=packaging.version --hidden-import=packaging.specifiers --hidden-import=packaging.requirements main.py 2>&1 | tee build.log

    - name: Upload build logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Windows-Build-Logs
        path: vault_analytics/build.log

    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: VaultAnalytics-Windows
        path: vault_analytics/dist/VaultAnalytics.exe

  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept Android Licenses
      run: yes | sdkmanager --licenses || true

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable
        cache: true

    - name: Clean build environment
      run: flutter clean

    - name: Get dependencies
      run: flutter pub get

    - name: Build APK
      run: flutter build apk --release --verbose --no-shrink 2>&1 | tee build_apk.log

    - name: Build App Bundle
      run: flutter build appbundle --release --verbose --no-shrink 2>&1 | tee build_aab.log

    - name: Upload build logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Android-Build-Logs
        path: |
          build_apk.log
          build_aab.log

    - name: Upload Android artifacts
      uses: actions/upload-artifact@v4
      with:
        name: TraceWallet-Android
        path: |
          build/app/outputs/flutter-apk/app-release.apk
          build/app/outputs/bundle/release/app-release.aab
