name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag (e.g. v1.1.0) — use the same as the git tag when tagging'
        required: true
        default: 'v1.0.0'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd vault_analytics
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build Windows executable
        run: |
          cd vault_analytics
          pyinstaller VaultAnalytics.spec

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: VaultAnalytics-Windows
          path: vault_analytics/dist/VaultAnalytics.exe
          if-no-files-found: error

  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses || true

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      # Split APKs are emitted under flutter-apk/ (not apk/release/) on current Flutter.
      - name: Build APKs and bundle
        run: |
          set -e
          mkdir -p release-out
          flutter build apk --release
          cp build/app/outputs/flutter-apk/app-release.apk release-out/app-release-universal.apk
          flutter build apk --release --split-per-abi
          ARM64="build/app/outputs/flutter-apk/app-arm64-v8a-release.apk"
          if [ ! -f "$ARM64" ]; then
            ARM64="build/app/outputs/apk/release/app-arm64-v8a-release.apk"
          fi
          if [ ! -f "$ARM64" ]; then
            echo "arm64 APK not found; listing flutter-apk:"; ls -la build/app/outputs/flutter-apk/ || true
            echo "listing apk/release:"; ls -la build/app/outputs/apk/release/ || true
            exit 1
          fi
          cp "$ARM64" release-out/app-arm64-v8a-release.apk
          flutter build appbundle --release
          cp build/app/outputs/bundle/release/app-release.aab release-out/

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TraceWallet-Android
          path: release-out/
          if-no-files-found: error

  publish-release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: VaultAnalytics-Windows
          path: release

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: TraceWallet-Android
          path: release-android

      - name: Stage release files
        run: |
          set -e
          mkdir -p upload
          test -f "release/VaultAnalytics.exe"
          test -f "release-android/app-release-universal.apk"
          test -f "release-android/app-arm64-v8a-release.apk"
          test -f "release-android/app-release.aab"
          cp "release/VaultAnalytics.exe" "upload/VaultAnalytics-${TAG_NAME}-Windows.exe"
          cp "release-android/app-release-universal.apk" "upload/TraceWallet-${TAG_NAME}-Android-universal.apk"
          cp "release-android/app-arm64-v8a-release.apk" "upload/TraceWallet-${TAG_NAME}-Android-arm64-v8a.apk"
          cp "release-android/app-release.aab" "upload/TraceWallet-${TAG_NAME}-Android.aab"
          ls -la upload/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Trace Wallet ${{ env.TAG_NAME }}
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: true
          files: |
            upload/VaultAnalytics-${{ env.TAG_NAME }}-Windows.exe
            upload/TraceWallet-${{ env.TAG_NAME }}-Android-universal.apk
            upload/TraceWallet-${{ env.TAG_NAME }}-Android-arm64-v8a.apk
            upload/TraceWallet-${{ env.TAG_NAME }}-Android.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
